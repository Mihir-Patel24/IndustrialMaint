version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrialmaint-app
    ports:
      - "8501:8501"
    environment:
      # If using .env file it will be loaded automatically, but we ensure basic Streamlit vars.
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      # Mount the database if using SQLite to persist it across container restarts
      # Note: Supabase PostgreSQL is the primary, this is fallback persistence
      - ./dashboard/industrialmaint.db:/app/dashboard/industrialmaint.db
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
